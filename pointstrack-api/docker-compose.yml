services:
  db:
    image: postgres:16-alpine
    container_name: pointstrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pointstrack
      POSTGRES_PASSWORD: pointstrack
      POSTGRES_DB: pointstrack
    ports:
      - "5432:5432"
    volumes:
      - pointstrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pointstrack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pointstrack_pgdata:
